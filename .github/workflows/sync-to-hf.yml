name: Sync to HuggingFace

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate package-lock.json if missing
        run: |
          if [ ! -f package-lock.json ]; then
            npm install
            git config user.email "kamaukevin0033@gmail.com"
            git config user.name "VinnsEdesigner"
            git add package-lock.json
            git commit -m "chore: add package-lock.json [skip ci]"
            git push origin main
          fi

      - name: Push to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HUGGINGFACES_SYNC }}
        run: |
          git config user.email "kamaukevin0033@gmail.com"
          git config user.name "VinnsEdesigner"
          git remote add hf https://VinnsEdesigner:$HF_TOKEN@huggingface.co/spaces/VinnsEdesigner/vinns-ai-backend
          git push hf main --force
